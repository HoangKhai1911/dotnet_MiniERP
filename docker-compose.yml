version: '3.8'
services:
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      SA_PASSWORD: "Your_strong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - dbdata:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: MiniErp.Api/Dockerfile
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=MiniErpDb;User Id=sa;Password=Your_strong!Passw0rd;
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:80"

  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "cd /app && npm install && npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  dbdata:
